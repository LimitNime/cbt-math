<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - MathEase CBT</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- SheetJS for Excel Export -->
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #F4F7FB;
      --surface: #FFFFFF;
      --primary: #2D6A4F;
      --primary-light: #D8F3E5;
      --text: #1E293B;
      --text-soft: #64748B;
      --border: #E2E8F0;
      --accent: #E76F51;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      background: var(--surface);
      padding: 20px;
      border-radius: var(--radius);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .btn:hover {
      background: #1e4d38;
      transform: translateY(-1px);
    }

    .btn-outline {
      background: transparent;
      color: var(--primary);
      border: 1px solid var(--primary);
    }

    .btn-outline:hover {
      background: var(--primary-light);
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      padding: 24px;
      border-radius: var(--radius);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    .stat-card h3 {
      font-size: 0.875rem;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 2rem;
      font-weight: 800;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    
    .stat-card .trend {
        font-size: 0.9rem;
        font-weight: 600;
    }
    .trend.up { color: var(--primary); }
    .trend.down { color: var(--accent); }

    /* Table */
    .table-container {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th,
    td {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }

    th {
      background: #F8FAFC;
      font-weight: 700;
      color: var(--text-soft);
      white-space: nowrap;
    }

    tr:hover {
      background: #F8FAFC;
    }

    .badge {
      display: inline-flex;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .badge.success { background: var(--primary-light); color: var(--primary); }
    .badge.danger { background: #FEE2E2; color: #DC2626; }
    .badge.neutral { background: #E2E8F0; color: #475569; }

    /* Loading */
    #loading {
      text-align: center;
      padding: 40px;
      font-weight: 600;
      color: var(--text-soft);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>🧮 MathEase CBT - Admin Dashboard</h1>
      <div style="display:flex; gap:10px;">
        <button class="btn btn-outline" onclick="loadData()">↻ Refresh</button>
        <button class="btn" onclick="exportToExcel()">📥 Export ke Excel</button>
      </div>
    </header>

    <div id="loading">Memuat data dari database...</div>

    <div id="dashboardContent" class="hidden">
      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <h3>Total Responden</h3>
          <div class="value" id="statTotal">0</div>
        </div>
        <div class="stat-card">
          <h3>Rata-rata Penurunan Cemas</h3>
          <div class="value">
            <span id="statCemas">0</span> 
            <span class="trend up">poin ↓</span>
          </div>
        </div>
        <div class="stat-card">
          <h3>Rata-rata Kenaikan Motivasi</h3>
          <div class="value">
            <span id="statMotivasi">0</span> 
            <span class="trend up">poin ↑</span>
          </div>
        </div>
        <div class="stat-card">
          <h3>Rata-rata Nilai Kuis</h3>
          <div class="value" id="statKuis">0%</div>
        </div>
      </div>

      <!-- Table -->
      <div class="table-container">
        <table id="dataTable">
          <thead>
            <tr>
              <th>Tanggal</th>
              <th>Nama Lengkap</th>
              <th>Kelas</th>
              <th>Sekolah</th>
              <th>Kecemasan (Pre → Post)</th>
              <th>Motivasi (Pre → Post)</th>
              <th>Emosi (Awal → Akhir)</th>
              <th>Skor Kuis</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- Data will be populated here -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // ══ SUPABASE INIT ══
    const SUPABASE_URL = 'https://rfdcbxhqqdmrfhlzngdf.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmZGNieGhxcWRtcmZobHpuZ2RmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MDgyNTksImV4cCI6MjA5MDI4NDI1OX0.UFsyCgIcFaPvHYdZKw7aPH5-U3e43ZmwYQsCfAZnlbo';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let globalData = [];

    async function loadData() {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('dashboardContent').classList.add('hidden');
      
      try {
        const { data, error } = await supabaseClient
          .from('cbt_results')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;
        
        globalData = data;
        renderDashboard(data);
      } catch (err) {
        console.error("Error loading data:", err);
        document.getElementById('loading').innerHTML = `<span style="color:red">Gagal memuat data. Pastikan tabel 'cbt_results' sudah dibuat di Supabase.</span>`;
      }
    }

    function renderDashboard(data) {
      if(data.length === 0) {
        document.getElementById('loading').innerHTML = "Belum ada data responden.";
        return;
      }

      // Hitung Stat
      const total = data.length;
      let totalTurunCemas = 0;
      let totalNaikMotivasi = 0;
      let totalSkorKuis = 0;

      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';

      data.forEach(row => {
        // Hitung selisih
        const selisihCemas = row.skor_pre_kecemasan - row.skor_post_kecemasan;
        const selisihMotivasi = row.skor_post_motivasi - row.skor_pre_motivasi;
        
        totalTurunCemas += selisihCemas;
        totalNaikMotivasi += selisihMotivasi;
        totalSkorKuis += row.skor_kuis;

        // Validasi Badge
        const cemasBadge = selisihCemas > 0 ? 'success' : selisihCemas === 0 ? 'neutral' : 'danger';
        const motivasiBadge = selisihMotivasi > 0 ? 'success' : selisihMotivasi === 0 ? 'neutral' : 'danger';

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${new Date(row.created_at).toLocaleDateString('id-ID', {day:'2-digit', month:'short', year:'numeric'})}</td>
          <td style="font-weight:600;">${row.nama}</td>
          <td>${row.kelas}</td>
          <td>${row.sekolah}</td>
          <td>
            ${row.skor_pre_kecemasan} → ${row.skor_post_kecemasan} 
            <span class="badge ${cemasBadge}">${selisihCemas > 0 ? 'Turun '+selisihCemas : selisihCemas}</span>
          </td>
          <td>
            ${row.skor_pre_motivasi} → ${row.skor_post_motivasi} 
            <span class="badge ${motivasiBadge}">${selisihMotivasi > 0 ? 'Naik '+selisihMotivasi : selisihMotivasi}</span>
          </td>
          <td>${row.emosi_awal} <span style="color:var(--text-soft)">→</span> ${row.emosi_akhir}</td>
          <td style="font-weight:700;">${row.skor_kuis}%</td>
        `;
        tbody.appendChild(tr);
      });

      // Update Top Stats
      document.getElementById('statTotal').textContent = total;
      document.getElementById('statCemas').textContent = (totalTurunCemas / total).toFixed(1);
      document.getElementById('statMotivasi').textContent = (totalNaikMotivasi / total).toFixed(1);
      document.getElementById('statKuis').textContent = Math.round(totalSkorKuis / total) + '%';

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('dashboardContent').classList.remove('hidden');
    }

    function exportToExcel() {
      if(globalData.length === 0) return alert("Tidak ada data untuk di eksport.");

      // Formasi data untuk Excel
      const excelData = globalData.map((row, index) => ({
        'No': index + 1,
        'Tanggal': new Date(row.created_at).toLocaleString('id-ID'),
        'Nama Lengkap': row.nama,
        'Kelas': row.kelas,
        'Sekolah': row.sekolah,
        'Skor Pre Kecemasan': row.skor_pre_kecemasan,
        'Skor Post Kecemasan': row.skor_post_kecemasan,
        'Penurunan Kecemasan': row.skor_pre_kecemasan - row.skor_post_kecemasan,
        'Skor Pre Motivasi': row.skor_pre_motivasi,
        'Skor Post Motivasi': row.skor_post_motivasi,
        'Peningkatan Motivasi': row.skor_post_motivasi - row.skor_pre_motivasi,
        'Emosi Awal': row.emosi_awal,
        'Emosi Akhir': row.emosi_akhir,
        'Skor Kuis (%)': row.skor_kuis
      }));

      // Buat Worksheet & Workbook
      const worksheet = XLSX.utils.json_to_sheet(excelData);
      
      // Auto-fit kolom (opsional tapi bagus)
      const wscols = [
        {wch:5}, {wch:20}, {wch:25}, {wch:10}, {wch:20},
        {wch:15}, {wch:15}, {wch:15}, {wch:15}, {wch:15},
        {wch:15}, {wch:15}, {wch:15}, {wch:15}
      ];
      worksheet['!cols'] = wscols;

      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "Data CBT");

      // Download file
      XLSX.writeFile(workbook, "Laporan_Hasil_CBT_MathEase.xlsx");
    }

    // Load data upon start
    loadData();
  </script>
</body>

</html>
